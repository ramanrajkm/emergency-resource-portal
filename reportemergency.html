<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Emergency</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Citizen Emergency Report Portal</h1>
        <nav>
            <a href="index.html">Back to Home</a>
        </nav>
    </header>

    <main>
        <section id="reportSection">
            <h2>Report an Emergency</h2>
            <form id="reportForm">
                <label for="name">Your Name:</label>
                <input type="text" id="name" required>

               <label for="location" style="display:flex; align-items:center; gap:10px;">
  Location:
  <button type="button" onclick="getLocation()" style="padding:6px 12px; cursor:pointer;">
    Use My Location
  </button>
</label>

<input type="text" id="location" required style="margin-bottom:15px;">

                <label for="emergencyType">Emergency Type:</label>
               <select id="emergencyType" required>
    <option value="">Select Emergency Type</option>

    <optgroup label="Natural Disasters">
        <option value="Flood">Flood</option>
        <option value="Earthquake">Earthquake</option>
        <option value="Cyclone">Cyclone / Storm</option>
        <option value="Landslide">Landslide</option>
        <option value="Tsunami">Tsunami</option>
        <option value="Drought">Drought</option>
        <option value="Forest Fire">Forest Fire</option>
    </optgroup>

    <optgroup label="Medical Emergencies">
        <option value="Medical Emergency">Medical Emergency</option>
        <option value="Heart Attack">Heart Attack</option>
        <option value="Serious Injury">Serious Injury</option>
        <option value="Poisoning">Poisoning</option>
    </optgroup>

    <optgroup label="Fire & Hazard">
        <option value="Fire">Fire</option>
        <option value="Gas Leak">Gas Leak</option>
        <option value="Explosion">Explosion</option>
    </optgroup>

    <optgroup label="Accidents">
        <option value="Road Accident">Road Accident</option>
        <option value="Train Accident">Train Accident</option>
        <option value="Aircraft Accident">Aircraft Accident</option>
    </optgroup>

    <optgroup label="Infrastructure Issues">
        <option value="Building Collapse">Building Collapse</option>
        <option value="Bridge Collapse">Bridge Collapse</option>
        <option value="Power Failure">Power Failure</option>
        <option value="Water Supply Issue">Water Supply Issue</option>
    </optgroup>

    <optgroup label="Public Safety">
        <option value="Animal Attack">Animal Attack</option>
        <option value="Missing Person">Missing Person</option>
        <option value="Crime / Theft">Crime / Theft</option>
    </optgroup>

    <option value="Other">Other</option>
</select>

                <label for="contact">Contact Number:</label>
                <input type="tel" id="contact" required placeholder="Enter 10 digit phone number" pattern="[0-9]{10}" maxlength="10">

                <label for="description">Description:</label>
                <textarea id="description" rows="4" required></textarea>

                <button type="submit">Submit Report</button>
            </form>
            <div id="reportMessage"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Citizen Portal</p>
    </footer>
</body>
</html>
